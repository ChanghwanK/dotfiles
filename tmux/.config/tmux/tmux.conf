# =============================================================================
# tmux 설정 — Catppuccin Mocha 테마 + vim 연동
# =============================================================================

# --- 기본 설정 ---------------------------------------------------------------

# True color 지원
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 마우스 지원
set -g mouse on

# 윈도우/pane 번호 1부터 시작
set -g base-index 1
setw -g pane-base-index 1

# 윈도우 닫힐 때 번호 재정렬
set -g renumber-windows on

# ESC 딜레이 제거 (vim 쾌적하게)
set -sg escape-time 0

# Shift+Enter 등 확장 키 시퀀스 통과 (Ghostty 네이티브 Shift+Enter 지원)
set -g extended-keys on

# 히스토리 버퍼 크기
set -g history-limit 50000

# --- 키바인딩 ----------------------------------------------------------------

# Prefix: Ctrl-b 유지 (Ghostty cmd+left → Ctrl-a 충돌 방지)

# 설정 리로드
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# kill-pane / kill-window 확인 없이 바로 실행
bind x kill-pane
bind & kill-window

# pane 분할 (현재 경로 유지)
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# pane 이동 (vim 스타일, prefix 키 사용)
bind j select-pane -D
bind k select-pane -U

# smart-splits.nvim tmux 연동 — @pane-is-vim pane option 방식 (shell 프로세스 감지 방식 대체)
bind-key -n 'C-h' if -F "#{@pane-is-vim}" 'send-keys C-h' { if -F '#{pane_at_left}'   '' 'select-pane -L' }
bind-key -n 'C-j' if -F "#{@pane-is-vim}" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if -F "#{@pane-is-vim}" 'send-keys C-k' { if -F '#{pane_at_top}'    '' 'select-pane -U' }
bind-key -n 'C-l' if -F "#{@pane-is-vim}" 'send-keys C-l' { if -F '#{pane_at_right}'  '' 'select-pane -R' }

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# 새 세션 생성 (이름 입력 프롬프트)
bind S command-prompt -p "Session name:" "new-session -s '%%'"

# window 이동 (Option+h / Option+l)
bind-key -n M-h previous-window
bind-key -n M-l next-window

# 윈도우 순서 변경 (Ctrl+Shift+Left/Right)
bind-key -n C-S-Left  swap-window -t -1 \; select-window -t -1
bind-key -n C-S-Right swap-window -t +1 \; select-window -t +1

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Catppuccin 테마 설정 (플러그인 로드 전에 선언) ---------------------------

# Mocha flavor
set -g @catppuccin_flavor "mocha"

# 윈도우 스타일: rounded tabs
set -g @catppuccin_window_status_style "rounded"

# 윈도우 이름을 현재 디렉토리의 폴더명으로 자동 표시
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# 배경 투명 (Ghostty 배경과 어우러짐)
set -g @catppuccin_status_background "default"

# --- 플러그인 ----------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 자동 저장 (15분 간격) + tmux 서버 시작 시 자동 복원
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# --- 상태 바 (TPM 초기화 전 설정 — continuum이 status-right에 save 인터폴레이션을 prepend함) ---

set -g status-position top
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# --- TPM 초기화 --------------------------------------------------------------

run '~/.config/tmux/plugins/tpm/tpm'
